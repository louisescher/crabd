# Example crab'd repository config. Drop this at your repo root as `.crabd.yml`.
# Every field is optional, omit anything to take the built-in default.

model: anthropic/claude-sonnet-4-6
trigger_phrase: "/crabd"
thinking_level: medium

providers:
  allowlist: [anthropic, openai]

permissions:
  allowed_associations: [OWNER, MEMBER, COLLABORATOR]

# How crab'd presents itself in comments. Defaults shown; set emoji: "" to remove
# the crab, footer: false to drop the "posted by" line.
appearance:
  name: "crab'd"
  emoji: "🦀"
  footer: true

# Repo-authored context crab'd folds into the prompt. Both default to true;
# shown here to make them explicit. See https://crabd.lou.gg/project-context/
context:
  instruction_files: true # read AGENTS.md / CLAUDE.md from the repo root
  skills: true # discover .agents/skills/ and .claude/skills/

# Let the agent READ other repositories (needs your own App or a scoped PAT — the
# default broker is single-repo). Off by default. See https://crabd.lou.gg/access/
# repos:
#   read: [acme/infra, acme/design-system]  # or: read: all

# Extra environment for the model's shell — e.g. to authenticate a private registry.
# Off by default; anything here is visible to the (network-capable) shell.
# The token_env var is forwarded automatically and written into a managed .npmrc as
# ${NAME}; pass it as a secret on the crab'd step (see the workflow's env: block).
# sandbox:
#   npmrc:
#     - registry: https://registry.npmjs.org
#       scope: "@myorg"
#       token_env: NPM_TOKEN
#   # env: [SOME_OTHER_TOKEN] # only for non-registry secrets a task needs

prompt:
  instructions: |
    - Match the existing code style and conventions.
    - Prefer small, focused changes with clear commit messages.

limits:
  max_turns: 40

# What crab'd does when a provider rate-limits or overloads a model. The main
# lever is falling back to a *different* model (the framework already retries the
# same one). Waits are computed backoff — provider retry-after isn't available.
rate_limit:
  # Ordered, cross-provider. Tried after the primary is rate-limited.
  fallback_models: [anthropic/claude-haiku-4-5, openai/gpt-5.5]
  max_retries: 4
  max_wait_seconds: 180 # total budget before giving up (caps CI minutes)
  trigger_scope: transient # transient | rate-limit | all
  # on_exhausted: soft   # omit for the per-mode default (review soft, others fail)
  backoff:
    strategy: exponential # exponential | linear | constant
    initial_delay_seconds: 2
    max_delay_seconds: 30
    multiplier: 2
    jitter: true

modes:
  mention:
    enabled: true
  review:
    enabled: true
    model: openai/gpt-5.5
    instructions: |
      - Flag missing tests for changed behavior.
      - Call out risky data migrations explicitly.
  implement:
    enabled: true
