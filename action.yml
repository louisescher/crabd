name: "crab'd"
description: "Forge-agnostic, multi-provider agent for @-mentions, PR reviews, and issue implementation."
author: "louisescher"
branding:
  icon: "cpu"
  color: "orange"

inputs:
  model:
    description: "Default model specifier (<provider>/<model>). Overrides config."
    required: false
  trigger-phrase:
    description: "Phrase that triggers crab'd (default /crabd)."
    required: false
  providers:
    description: "Comma-separated provider allowlist (empty = allow any)."
    required: false
  thinking-level:
    description: "Reasoning effort: off|minimal|low|medium|high|xhigh."
    required: false
  github-token:
    description: "Token for forge operations. Falls back to GITHUB_TOKEN (github-actions identity)."
    required: false
  broker-url:
    description: "crab'd token broker URL for the canonical crab'd[bot] identity (needs id-token: write)."
    required: false
  app-id:
    description: "GitHub App ID — self-host your own App instead of the broker."
    required: false
  app-private-key:
    description: "GitHub App private key (raw PEM or base64-encoded)."
    required: false
  app-installation-id:
    description: "GitHub App installation ID (optional; auto-resolved from the repo)."
    required: false
  org-config-repo:
    description: "Org config repo slug (default <owner>/.crabd-config)."
    required: false
  forge:
    description: "Force the forge kind: github|forgejo (auto-detected otherwise)."
    required: false

outputs:
  mode:
    description: "The mode crab'd ran (mention/review/implement), if any."
  result:
    description: "The validated structured output the model produced, as JSON."
  summary:
    description: "Human-readable summary of what crab'd did."

runs:
  using: docker
  image: docker://ghcr.io/louisescher/crabd:v0
  env:
    CRABD_INPUT_MODEL: ${{ inputs.model }}
    CRABD_INPUT_TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
    CRABD_INPUT_PROVIDERS: ${{ inputs.providers }}
    CRABD_INPUT_THINKING_LEVEL: ${{ inputs.thinking-level }}
    CRABD_GITHUB_TOKEN: ${{ inputs.github-token }}
    CRABD_BROKER_URL: ${{ inputs.broker-url }}
    CRABD_APP_ID: ${{ inputs.app-id }}
    CRABD_APP_PRIVATE_KEY: ${{ inputs.app-private-key }}
    CRABD_APP_INSTALLATION_ID: ${{ inputs.app-installation-id }}
    CRABD_ORG_CONFIG_REPO: ${{ inputs.org-config-repo }}
    CRABD_FORGE: ${{ inputs.forge }}
